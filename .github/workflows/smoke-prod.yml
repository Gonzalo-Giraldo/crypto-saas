name: Smoke Prod

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      base_url:
        description: "API base URL (e.g. https://api.example.com)"
        required: true
        type: string
      require_ibkr_secret:
        description: "Fail if IBKR secret is missing"
        required: false
        default: false
        type: boolean
      allow_binance_test_error:
        description: "Treat Binance test-order controlled API errors as PASS"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 11 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || secrets.SMOKE_BASE_URL }}
      REQUIRE_IBKR_SECRET: ${{ github.event_name == 'workflow_dispatch' && inputs.require_ibkr_secret || 'false' }}
      ALLOW_BINANCE_TEST_ERROR: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_binance_test_error || 'true' }}
      SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL != '' && secrets.SMOKE_EMAIL || 'smoke.ci@example.com' }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL != '' && secrets.SMOKE_ADMIN_EMAIL || secrets.DUAL_ADMIN_EMAIL }}
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD != '' && secrets.SMOKE_ADMIN_PASSWORD || secrets.DUAL_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          set -euo pipefail
          if [[ -z "${BASE_URL:-}" ]]; then
            echo "BASE_URL is empty. Set workflow input 'base_url' or repository secret 'SMOKE_BASE_URL'."
            exit 1
          fi

      - name: Create smoke user and seed Binance secret
        env:
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_BINANCE_API_KEY: ${{ secrets.SMOKE_BINANCE_API_KEY }}
          SMOKE_BINANCE_API_SECRET: ${{ secrets.SMOKE_BINANCE_API_SECRET }}
          SMOKE_ADMIN_EMAIL: ${{ env.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ env.SMOKE_ADMIN_PASSWORD }}
          SMOKE_ADMIN_OTP: ${{ secrets.SMOKE_ADMIN_OTP }}
          DUAL_ADMIN_TOTP_SECRET: ${{ secrets.DUAL_ADMIN_TOTP_SECRET }}
        run: |
          set -euo pipefail
          generate_totp() {
            local secret="$1"
            python3 -c 'import base64,binascii,hashlib,hmac,struct,sys,time; from urllib.parse import parse_qs,urlparse; s=(sys.argv[1] or "").strip().replace(" ","").upper(); s=(parse_qs(urlparse(s).query).get("secret",[""])[0] if s.startswith("OTPAUTH://") else s); s=s.split("SECRET=",1)[1].split("&",1)[0] if ("SECRET=" in s and not s.startswith("OTPAUTH://")) else s; s=s.strip().replace(" ","").upper(); pad="="*((8-len(s)%8)%8); k=base64.b32decode(s+pad,casefold=True) if s else b""; c=int(time.time()//30); m=struct.pack(">Q",c); h=hmac.new(k,m,hashlib.sha1).digest() if s else b""; o=(h[-1]&0x0F) if s else 0; print(f"{((struct.unpack('\"'\"'>I'\"'\"',h[o:o+4])[0]&0x7FFFFFFF)%1000000):06d}" if s else "")' "$secret"
          }

          if [[ -z "${SMOKE_PASSWORD:-}" ]]; then
            echo "Missing required secret: SMOKE_PASSWORD"
            exit 1
          fi
          if [[ -z "${SMOKE_BINANCE_API_KEY:-}" || -z "${SMOKE_BINANCE_API_SECRET:-}" ]]; then
            echo "Missing required secrets: SMOKE_BINANCE_API_KEY / SMOKE_BINANCE_API_SECRET"
            exit 1
          fi

          export EMAIL="${SMOKE_EMAIL}"
          export PASSWORD="$SMOKE_PASSWORD"

          # Attempt public register first (may be disabled in production).
          curl -s -X POST "$BASE_URL/auth/register" \
            -H "Content-Type: application/json" \
            --data "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}" >/dev/null || true

          TOKEN=$(curl -s -X POST "$BASE_URL/auth/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "username=$EMAIL&password=$PASSWORD" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin).get("access_token",""))')

          # Fallback when public register is blocked:
          # create/update smoke user via admin API if admin secrets are available.
          if [[ -z "$TOKEN" ]]; then
            if [[ -z "${SMOKE_ADMIN_EMAIL:-}" || -z "${SMOKE_ADMIN_PASSWORD:-}" ]]; then
              echo "Failed to login smoke user and no SMOKE_ADMIN_EMAIL/SMOKE_ADMIN_PASSWORD configured for fallback."
              exit 1
            fi
            admin_login_data="username=$SMOKE_ADMIN_EMAIL&password=$SMOKE_ADMIN_PASSWORD"
            ADMIN_TOKEN=$(curl -s -X POST "$BASE_URL/auth/login" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data "$admin_login_data" \
              | python3 -c 'import sys,json; print(json.load(sys.stdin).get("access_token",""))')
            if [[ -z "$ADMIN_TOKEN" ]]; then
              admin_otp="${SMOKE_ADMIN_OTP:-}"
              if [[ -z "$admin_otp" && -n "${DUAL_ADMIN_TOTP_SECRET:-}" ]]; then
                admin_otp="$(generate_totp "$DUAL_ADMIN_TOTP_SECRET" || true)"
              fi
              if [[ -n "$admin_otp" ]]; then
                admin_login_data="username=$SMOKE_ADMIN_EMAIL&password=$SMOKE_ADMIN_PASSWORD&otp=$admin_otp"
                ADMIN_TOKEN=$(curl -s -X POST "$BASE_URL/auth/login" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  --data "$admin_login_data" \
                  | python3 -c 'import sys,json; print(json.load(sys.stdin).get("access_token",""))')
              fi
            fi
            if [[ -z "$ADMIN_TOKEN" ]]; then
              echo "Failed to login fallback admin user"
              exit 1
            fi

            # Idempotent create/update smoke user as trader.
            create_resp=$(curl -s -X POST "$BASE_URL/users" \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\",\"role\":\"trader\"}" || true)
            if [[ "$create_resp" == *"already exists"* ]]; then
              user_id=$(curl -s "$BASE_URL/users" \
                -H "Authorization: Bearer $ADMIN_TOKEN" \
                | python3 -c 'import json,sys; arr=json.load(sys.stdin); e="'$EMAIL'".lower(); print(next((u.get("id","") for u in arr if str(u.get("email","")).lower()==e), ""))')
              if [[ -n "$user_id" ]]; then
                curl -s -X PUT "$BASE_URL/users/$user_id/password?reason=smoke%20ci%20password%20sync" \
                  -H "Authorization: Bearer $ADMIN_TOKEN" \
                  -H "Content-Type: application/json" \
                  --data "{\"new_password\":\"$PASSWORD\"}" >/dev/null || true
              fi
            fi

            TOKEN=$(curl -s -X POST "$BASE_URL/auth/login" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data "username=$EMAIL&password=$PASSWORD" \
              | python3 -c 'import sys,json; print(json.load(sys.stdin).get("access_token",""))')
            if [[ -z "$TOKEN" ]]; then
              echo "Failed to login smoke user after admin fallback"
              exit 1
            fi
          fi

          curl -s -X POST "$BASE_URL/users/exchange-secrets" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"exchange\":\"BINANCE\",\"api_key\":\"$SMOKE_BINANCE_API_KEY\",\"api_secret\":\"$SMOKE_BINANCE_API_SECRET\"}" >/dev/null

          echo "SMOKE_EMAIL=$EMAIL" >> "$GITHUB_ENV"

      - name: Run smoke script
        id: run_smoke
        continue-on-error: true
        env:
          EMAIL: ${{ env.SMOKE_EMAIL }}
          PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x scripts/smoke_prod.sh
          attempt=1
          max_attempts=2
          success=0
          : > smoke_output.log

          while [[ "$attempt" -le "$max_attempts" ]]; do
            echo "=== Smoke attempt $attempt/$max_attempts ===" | tee -a smoke_output.log
            if scripts/smoke_prod.sh 2>&1 | tee -a smoke_output.log; then
              success=1
              break
            fi
            if [[ "$attempt" -lt "$max_attempts" ]]; then
              echo "Smoke failed on attempt $attempt. Retrying in 15 seconds..." | tee -a smoke_output.log
              sleep 15
            fi
            attempt=$((attempt + 1))
          done

          if [[ "$success" -ne 1 ]]; then
            echo "Smoke failed after $max_attempts attempts." | tee -a smoke_output.log
            exit 1
          fi

      - name: Auto-remediate and rerun smoke
        id: auto_remediate
        if: steps.run_smoke.outcome == 'failure'
        continue-on-error: true
        env:
          EMAIL: ${{ env.SMOKE_EMAIL }}
          PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          : > smoke_remediation.log
          if [[ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]]; then
            echo "Auto-remediation skipped: RENDER_DEPLOY_HOOK_URL is not configured." | tee -a smoke_remediation.log
            exit 1
          fi

          echo "Triggering Render redeploy via deploy hook..." | tee -a smoke_remediation.log
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL" | tee -a smoke_remediation.log
          echo | tee -a smoke_remediation.log
          echo "Waiting 45s for service restart..." | tee -a smoke_remediation.log
          sleep 45

          echo "Running post-remediation smoke attempt..." | tee -a smoke_output.log smoke_remediation.log
          chmod +x scripts/smoke_prod.sh
          scripts/smoke_prod.sh 2>&1 | tee -a smoke_output.log smoke_remediation.log

      - name: Build run summary
        if: always()
        run: |
          {
            echo "## Smoke Prod Result"
            echo
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Base URL: \`${BASE_URL}\`"
            echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Smoke step outcome: \`${{ steps.run_smoke.outcome }}\`"
            echo "- Auto-remediation outcome: \`${{ steps.auto_remediate.outcome || 'not-run' }}\`"
            echo "- Retry policy: \`max_attempts=2\`"
            echo
            if [[ -f smoke_output.log ]]; then
              SUMMARY_LINE=$(grep -E "Summary: PASS=[0-9]+ FAIL=[0-9]+" smoke_output.log | tail -n 1 || true)
              if [[ -n "${SUMMARY_LINE}" ]]; then
                echo "- ${SUMMARY_LINE}"
              fi
              echo
              echo "### Tail log"
              echo '```text'
              tail -n 40 smoke_output.log
              echo '```'
            else
              echo "- No smoke output log found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prod-${{ github.run_id }}
          path: |
            smoke_output.log
            smoke_remediation.log
          if-no-files-found: warn

      - name: Escalate issue after 2 consecutive failures
        if: steps.run_smoke.outcome == 'failure' && steps.auto_remediate.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueTitle = '[Smoke Prod] Incident open';
            const runsResp = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'completed',
              per_page: 30
            });
            const sameWorkflowRuns = (runsResp.data.workflow_runs || [])
              .filter(r => r.path && r.path.includes('.github/workflows/smoke-prod.yml'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Current run is still in progress, so the latest completed run is the immediately previous one.
            const previousRun = sameWorkflowRuns[0];
            const prevWasFailure = previousRun && previousRun.conclusion === 'failure';

            if (!prevWasFailure) {
              core.notice('First failure detected. Waiting for a second consecutive failure before opening an incident.');
              return;
            }

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = openIssues.find(i => i.title === issueTitle);
            const body = [
              `Smoke workflow failed.`,
              ``,
              `- Repository: ${context.repo.owner}/${context.repo.repo}`,
              `- Branch: ${context.ref}`,
              `- Run: ${runUrl}`,
              ``,
              `Please review the workflow logs and artifact \`smoke_output.log\`.`
            ].join('\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
                labels: ['incident']
              });
            }

      - name: Auto-close incident on recovery
        if: steps.run_smoke.outcome == 'success' || steps.auto_remediate.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueTitle = '[Smoke Prod] Incident open';
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const incident = openIssues.find(i => i.title === issueTitle);
            if (incident) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: incident.number,
                body: `Smoke workflow recovered successfully. Run: ${runUrl}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: incident.number,
                state: 'closed'
              });
            }

      - name: Fail job if smoke failed
        if: steps.run_smoke.outcome == 'failure' && steps.auto_remediate.outcome != 'success'
        run: exit 1
