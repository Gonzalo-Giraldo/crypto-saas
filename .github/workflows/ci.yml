name: CI

on:
  push:
    branches:
      - main
      - rebuild/minimal-core-py311
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Docker image
        run: docker build -t minimal-core-py311-check .

      - name: Run tests in Docker
        run: docker run --rm -e PYTHONPATH=/app -w /app minimal-core-py311-check pytest -q tests/test_minimal_core_baseline.py
