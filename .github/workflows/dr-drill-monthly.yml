name: DR Drill Monthly

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "API base URL (e.g. https://api.example.com)"
        required: false
        type: string
  schedule:
    - cron: "15 12 1 * *"

jobs:
  dr_drill_monthly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || secrets.SMOKE_BASE_URL }}
    steps:
      - name: Open/refresh monthly DR checklist issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = '[DR Monthly] Checklist open';
            const baseUrl = process.env.BASE_URL || '(set BASE_URL)';
            const body = [
              `Ejecucion mensual de simulacro DR.`,
              ``,
              `## Alcance`,
              `- Backup dry-run`,
              `- Restore dry-run`,
              `- Registro de evidencia RTO/RPO`,
              ``,
              `## Comandos base`,
              `\`\`\`bash`,
              `BASE_URL="${baseUrl}"`,
              `DRY_RUN=true BACKUP_FORMAT=custom DATABASE_URL='postgresql://...' scripts/backup_db.sh`,
              `DRY_RUN=true DATABASE_URL='postgresql://...' BACKUP_FILE='./backups/archivo.dump' scripts/restore_db.sh`,
              `\`\`\``,
              ``,
              `## Evidencia obligatoria`,
              `- [ ] Fecha/hora y operador`,
              `- [ ] Backup file y checksum`,
              `- [ ] Resultado restore dry-run`,
              `- [ ] RTO observado`,
              `- [ ] RPO observado`,
              `- [ ] Actualizado docs/registro_operacion_diaria.md`,
              `- [ ] Actualizado docs/runbook_disaster_recovery.md (seccion simulacro si aplica)`,
              ``,
              `Referencias:`,
              `- docs/runbook_disaster_recovery.md`,
              `- docs/registro_operacion_diaria.md`,
            ].join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = openIssues.find(i => i.title === issueTitle);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Nueva ejecucion mensual requerida.\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
                labels: ['operations', 'dr']
              });
            }

      - name: Build run summary
        run: |
          {
            echo "## DR Drill Monthly"
            echo
            echo "- Base URL: \`${BASE_URL:-not-set}\`"
            echo "- Se abrio/actualizo issue mensual de DR."
            echo "- Completar evidencia en docs/registro_operacion_diaria.md."
          } >> "$GITHUB_STEP_SUMMARY"
